# Modernized 1x training recipe — same architecture as keypoint_rcnn_R_50_FPN_3x.yaml,
# Phase 1 modernization recipe applied. Used for fast iteration during recipe
# development; 1x converges in 30% of 3x compute, and a recipe that beats the
# baseline at 1x almost certainly beats it at 3x.
#
# Differences vs keypoint_rcnn_R_50_FPN_3x.yaml:
#   - Explicit 1x schedule (90k iters; default schema is 3x = 270k)
#   - Cosine LR decay instead of WarmupMultiStepLR
#   - Photometric color jitter enabled
#   - EMA weight averaging enabled
#   - Mosaic + MixUp multi-image augmentation (CopyPaste excluded —
#     keypoint annotations don't survive instance pasting cleanly)
#
# Expected AP delta vs the D2 1x baseline: +1 to +2 AP at 1x (both bbox AP
# and keypoint AP). If the gain is < +1 AP, the augmentation pipeline has
# a bug — debug before scaling to 3x.
#
# Note: only one class (`person`) for COCO keypoints. ``num_classes: 1`` below.
model:
  meta_architecture: keypoint_rcnn
  keypoint_on: true
  backbone:
    name: resnet50
    norm: FrozenBN
    freeze_at: 2
    # See faster_rcnn_R_50_FPN_1x_modern.yaml for why these match torchvision
    # IMAGENET1K_V2 instead of D2's caffe2 layout.
    stride_in_1x1: false
  roi_heads:
    num_classes: 1
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  roi_keypoint_head: {}
  pixel_std: [58.395, 57.120, 57.375]

input:
  min_size_test: 800
  max_size_test: 1333
  # Modernization: colour jitter applied after the geometric augs.
  # Doesn't touch bboxes / masks / keypoints — pure pixel-value modification.
  # Hue jitter kept conservative (0.015) — too much hue shift on humans
  # breaks skin-tone-correlated keypoint priors.
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5
  mosaic_prob: 0.5
  mosaic_canvas_size: [1024, 1024]
  mixup_prob: 0.1
  mixup_alpha: 8.0

solver:
  # Effective batch size = ims_per_batch * grad_accum_steps. For a 24 GB
  # GPU keep ims_per_batch=16, grad_accum_steps=1 (the D2 1x baseline).
  # For a 12 GB GPU drop ims_per_batch to 8 and set grad_accum_steps=2 —
  # gradients are mathematically identical, AP target unchanged.
  ims_per_batch: 16
  grad_accum_steps: 1
  base_lr: 0.02
  # 1x schedule: 90k iters with LR decay milestones kept for schema
  # validation, but they're inert under WarmupCosineLR (which uses a
  # smooth half-cosine decay over [warmup_iters, max_iter) instead).
  max_iter: 90_000
  steps: [60_000, 80_000]
  warmup_iters: 1_000
  warmup_factor: 0.001
  warmup_method: linear
  lr_scheduler_name: WarmupCosineLR
  # Modernization: EMA shadow tracks live weights with warmup ramp.
  # Final-checkpoint EMA weights typically score 0.3-0.5 AP higher than
  # the live weights. Saved separately under output_dir/ema/.
  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
