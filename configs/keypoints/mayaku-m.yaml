# mayaku-m (keypoints) — real-time hero. ConvNeXt-tiny + FPN + UniQuery (QGN, 2 stages).
# ~33M params (detection). Proven head dims: dim_feedforward = 4*hidden_dim,
# dim_dynamic = hidden_dim/4 (Sparse R-CNN ratio), pooler 7.

model:
  meta_architecture: uniquery
  pixel_mean: [123.675, 116.28, 103.53]
  pixel_std:  [58.395, 57.12, 57.375]
  backbone:
    name: convnext_tiny

    weights_path: null
    freeze_at: 0
    norm: FrozenBN
  fpn:
    in_features: [res2, res3, res4, res5]
    out_channels: 128   # MUST equal uniquery_head.hidden_dim
    norm: ''
    fuse_type: sum
  roi_heads:
    num_classes: 1
  uniquery_head:
    num_proposals: 300
    hidden_dim: 128
    num_heads: 8
    num_stages: 2
    uniquery_generator: true
    dim_feedforward: 512    # 4 x hidden_dim
    dim_dynamic: 32         # hidden_dim / 4
    pooler_resolution: 7
    pooler_sampling_ratio: 1   # samples per ROI bin (fixed; same in train + deploy). 1 = real-time tier, 2 = accuracy tier
    dropout: 0.0
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    cascade_iou_thresholds: []
  uniquery_keypoint:
    pooler_resolution: 14
    num_keypoints: 17        # COCO person-pose keypoints
    loss_weight: 1.0

input:
  resize_mode: letterbox
  size_budget: 640   # compute-budget dial (canvas = largest 128-aligned (H,W) under size_budget^2)
  train_scale_min: 0.64   # multi-scale letterbox train: budget fraction floor → full deploy canvas
  random_flip: horizontal
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5

solver:
  optimizer_name: AdamW
  base_lr: 2.5e-5
  weight_decay: 1.0e-4
  weight_decay_norm: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8
  llrd_enabled: true
  llrd_decay: 0.8
  num_epochs: 12
  ims_per_batch: 2
  grad_accum_steps: 8
  clip_gradients_enabled: true
  clip_gradients_value: 1.0
  clip_gradients_type: norm
  grad_norm_log_enabled: false
  amp_enabled: true
  amp_dtype: bf16
  checkpoint_period: 5000
  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2000.0

test:
  detections_per_image: 100
  eval_period: 5000
  precise_bn_enabled: false

dataloader:
  num_workers: 4
  aspect_ratio_grouping: true
  sampler_train: TrainingSampler
  filter_empty_annotations: true

auto_config:
  enabled: false
