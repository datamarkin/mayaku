# Modernized 3x training recipe — same architecture as keypoint_rcnn_R_50_FPN_3x.yaml,
# Phase 1 modernization recipe applied. Production target after the 1x recipe
# has been validated.
#
# Differences vs keypoint_rcnn_R_50_FPN_3x.yaml:
#   - Explicit 3x schedule (270k iters; same as default schema)
#   - Cosine LR decay instead of WarmupMultiStepLR
#   - Photometric color jitter enabled
#   - EMA weight averaging enabled
#   - Mosaic + MixUp multi-image augmentation (CopyPaste excluded —
#     keypoint annotations don't survive instance pasting cleanly)
#
# Expected AP delta vs the D2 3x baseline: +2 to +4 AP both bbox and keypoint AP.
# Train this only after the 1x recipe shows ≥ +1 AP — running 3x is 3× the
# compute of 1x.
model:
  meta_architecture: keypoint_rcnn
  keypoint_on: true
  backbone:
    name: resnet50
    norm: FrozenBN
    freeze_at: 2
    # See faster_rcnn_R_50_FPN_1x_modern.yaml for why these match torchvision
    # IMAGENET1K_V2 instead of D2's caffe2 layout.
    stride_in_1x1: false
  roi_heads:
    num_classes: 1
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  roi_keypoint_head: {}
  pixel_std: [58.395, 57.120, 57.375]

input:
  min_size_test: 800
  max_size_test: 1333
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5
  mosaic_prob: 0.5
  mosaic_canvas_size: [1024, 1024]
  mixup_prob: 0.1
  mixup_alpha: 8.0

solver:
  # Effective batch size = ims_per_batch * grad_accum_steps. For a 24 GB
  # GPU keep ims_per_batch=16, grad_accum_steps=1 (the D2 3x baseline).
  # For a 12 GB GPU drop ims_per_batch to 8 and set grad_accum_steps=2 —
  # gradients are mathematically identical, AP target unchanged.
  ims_per_batch: 16
  grad_accum_steps: 1
  base_lr: 0.02
  max_iter: 270_000
  steps: [210_000, 250_000]
  warmup_iters: 1_000
  warmup_factor: 0.001
  warmup_method: linear
  lr_scheduler_name: WarmupCosineLR
  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
