# R-50-FPN Mask R-CNN — 3x schedule (270k iters). Production target.
# Train after mask_rcnn_R_50_FPN_1x.yaml validates ≥ +1 AP over the D2 baseline.
#
# Recipe: cosine LR, EMA, color jitter, Mosaic + MixUp + CopyPaste.
# CopyPaste requires bitmask format (set below).
# Backbone trained as BN+freeze_at=0 (tools/train_mayaku.py injects this);
# config ships as FrozenBN+freeze_at=2 for fine-tuning compatibility.
#
# D2 3x baseline: d2_baseline/segmentation/mask_rcnn_R_50_FPN_3x.yaml
# D2 published 3x: 41.2 box AP / 37.3 mask AP. Target with this recipe: ≥ +2 AP both.
model:
  meta_architecture: mask_rcnn
  mask_on: true
  backbone:
    name: resnet50
    norm: FrozenBN
    freeze_at: 2
    # See faster_rcnn_R_50_FPN_1x_modern.yaml for why these match torchvision
    # IMAGENET1K_V2 instead of D2's caffe2 layout.
    stride_in_1x1: false
  roi_heads:
    num_classes: 80
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  roi_mask_head: {}
  pixel_std: [58.395, 57.120, 57.375]

input:
  min_size_test: 800
  max_size_test: 1333
  mask_format: bitmask
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5
  copy_paste_prob: 0.5

solver:
  # Effective batch size = ims_per_batch * grad_accum_steps. For a 24 GB
  # GPU keep ims_per_batch=16, grad_accum_steps=1 (the D2 3x baseline).
  # For a 12 GB GPU drop ims_per_batch to 8 and set grad_accum_steps=2 —
  # gradients are mathematically identical, AP target unchanged.
  ims_per_batch: 16
  grad_accum_steps: 1
  base_lr: 0.02
  max_iter: 270_000
  steps: [210_000, 250_000]
  warmup_iters: 1_000
  warmup_factor: 0.001
  warmup_method: linear
  lr_scheduler_name: WarmupCosineLR
  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
