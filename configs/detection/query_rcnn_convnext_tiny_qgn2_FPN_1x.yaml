# QueryRCNN QGN-2 — ConvNeXt-Tiny(DINOv3) + FPN + QueryGenerator, 2 stages, COCO 1x.
#
# The production-candidate run. Identical recipe to the 46.68-AP flagship
# (tv_tier3_query_rcnn_convnext_tiny_coco: 6 blind stages, this same backbone,
# 800px multi-scale, eff. batch 16, AMP off, 90k) except:
#   - Head: 6 blind stages -> 2 stages + QGN (Featurized Query R-CNN, 2206.06258).
#   - Batch geometry: 2x8 instead of 4x4 (same effective 16) — 800px at bs4
#     does not fit the RTX 3060's 12GB with AMP off.
# One-variable change vs the flagship: whatever AP comes out is attributable
# to the head swap alone.
#
# Evidence behind the bet (2026-06): coco_4k arms, same warm-started budget —
#   qgn2 35.07 vs blind2 32.18 vs no-retrain truncation 31.0.
# Paper reference: 2-stage+QGN 44.6 ~= 6-stage blind 44.5 (R50-3x).
# Pre-registered expectation for this run: 46-47; below ~45.5 means the QGN
# implementation loses something at 90k that the 4k subset didn't expose.

model:
  meta_architecture: query_rcnn
  pixel_mean: [123.675, 116.28, 103.53]
  pixel_std:  [58.395, 57.12, 57.375]
  backbone:
    name: convnext_tiny
    weights_path: /mnt/markin/Intranet/dinov3/dinov3_convnext_tiny_pretrain_lvd1689m-21b726bb.pth
    freeze_at: 0
    norm: FrozenBN
  fpn:
    in_features: [res2, res3, res4, res5]
    out_channels: 256
    norm: ''
    fuse_type: sum
  roi_heads:
    # QueryRCNN ignores most roi_heads knobs; only num_classes is read by the factory.
    num_classes: 80
  query_rcnn_head:
    num_proposals: 300
    hidden_dim: 256
    num_heads: 8
    # The head swap: 2 stages fed by an image-conditioned QueryGenerator
    # (3x3 conv + 1x1 branches on P3-P7) instead of 6 stages from learned
    # embeddings. QGN loss defaults: quality_alpha 0.8, obj 1.0 / giou 2.0.
    num_stages: 2
    query_generator: true
    dim_feedforward: 2048
    dim_dynamic: 64
    pooler_resolution: 7
    dropout: 0.0
    # Hungarian matcher cost weights (Sparse R-CNN canonical).
    cost_class: 2.0
    cost_bbox: 5.0
    cost_giou: 2.0
    cascade_iou_thresholds: []

input:
  # Multi-scale training (640..800 short side), 1333 long-side cap. From FRCNN baseline.
  min_size_train: [640, 672, 704, 736, 768, 800]
  max_size_train: 1333
  min_size_train_sampling: choice
  min_size_test: 800
  max_size_test: 1333
  random_flip: horizontal
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5

solver:
  optimizer_name: AdamW
  base_lr: 2.5e-5
  weight_decay: 1.0e-4
  weight_decay_norm: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

  llrd_enabled: true
  llrd_decay: 0.8

  lr_scheduler_name: WarmupCosineLR
  max_iter: 90000
  # steps is unused by cosine but kept for schema validity.
  steps: [60000, 80000]
  warmup_iters: 1500
  warmup_factor: 0.001
  warmup_method: linear

  # Effective batch 16 (2 imgs/step x 8 accum) — matches the flagship's
  # effective batch; geometry differs only because of the 12GB card.
  ims_per_batch: 2
  grad_accum_steps: 8

  clip_gradients_enabled: true
  clip_gradients_value: 1.0
  clip_gradients_type: norm
  grad_norm_log_enabled: false

  # AMP off — purist comparison against the flagship (also AMP off).
  amp_enabled: false
  amp_dtype: fp16

  checkpoint_period: 5000

  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2000.0

test:
  detections_per_image: 100
  eval_period: 5000
  precise_bn_enabled: false

dataloader:
  num_workers: 4
  aspect_ratio_grouping: true
  sampler_train: TrainingSampler
  filter_empty_annotations: true

auto_config:
  enabled: false
