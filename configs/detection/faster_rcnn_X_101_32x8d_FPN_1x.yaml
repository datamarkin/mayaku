# X-101-32x8d-FPN Faster R-CNN — 1x schedule (90k iters).
# Top of the detection model zoo; ~2× compute per iter vs R-101.
# At 12 GB GPU: ims_per_batch=4, grad_accum_steps=4. At 80 GB: ims_per_batch=16.
#
# Recipe: cosine LR, EMA, color jitter, Mosaic + MixUp. Same as R-50 1x.
# Backbone trained as BN+freeze_at=0 (tools/train_mayaku.py injects this);
# config ships as FrozenBN+freeze_at=2 for fine-tuning compatibility.
#
# D2 3x baseline: d2_baseline/detection/faster_rcnn_X_101_32x8d_FPN_3x.yaml
# D2 published 3x: 43.0 box AP. Target with this recipe at 1x: ≥ 41 AP.
model:
  meta_architecture: faster_rcnn
  backbone:
    name: resnext101_32x8d
    norm: FrozenBN
    freeze_at: 2
    stride_in_1x1: false
  roi_heads:
    num_classes: 80
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  pixel_std: [58.395, 57.120, 57.375]

input:
  min_size_test: 800
  max_size_test: 1333
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5
  mosaic_prob: 0.5
  mosaic_canvas_size: [1024, 1024]
  mixup_prob: 0.1
  mixup_alpha: 8.0

solver:
  # X-101 is memory-heavy. At 12 GB use ims_per_batch=4, grad_accum_steps=4.
  # At 24 GB use ims_per_batch=8, grad_accum_steps=2.
  # At 80 GB (H100) use ims_per_batch=16, grad_accum_steps=1.
  ims_per_batch: 8
  grad_accum_steps: 2
  base_lr: 0.02
  max_iter: 90_000
  steps: [60_000, 80_000]
  warmup_iters: 1_000
  warmup_factor: 0.001
  warmup_method: linear
  lr_scheduler_name: WarmupCosineLR
  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
