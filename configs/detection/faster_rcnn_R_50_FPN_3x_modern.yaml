# Modernized 3x training recipe — same architecture as faster_rcnn_R_50_FPN_3x.yaml,
# Phase 1 modernization recipe applied. Production target after the 1x recipe
# has been validated.
#
# Differences vs faster_rcnn_R_50_FPN_3x.yaml:
#   - Explicit 3x schedule (270k iters; same as default schema)
#   - Cosine LR decay instead of WarmupMultiStepLR
#   - Photometric color jitter enabled
#   - EMA weight averaging enabled
#
# Expected AP delta vs the 40.2 baseline at 3x: +2 to +4 AP (target ≥ 42 AP).
# Train this only after the 1x recipe shows ≥ +1 AP — running 3x is 3× the
# compute of 1x.
model:
  meta_architecture: faster_rcnn
  backbone:
    name: resnet50
    norm: FrozenBN
    freeze_at: 2
    stride_in_1x1: true
  roi_heads:
    num_classes: 80
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  pixel_std: [1.0, 1.0, 1.0]

input:
  min_size_test: 800
  max_size_test: 1333
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5

solver:
  ims_per_batch: 16
  base_lr: 0.02
  max_iter: 270_000
  steps: [210_000, 250_000]
  warmup_iters: 1_000
  warmup_factor: 0.001
  warmup_method: linear
  lr_scheduler_name: WarmupCosineLR
  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
