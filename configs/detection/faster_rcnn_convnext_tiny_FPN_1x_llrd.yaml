# Faster R-CNN — ConvNeXt-Tiny + FPN + LLRD, 1x schedule (90k iters).
#
# This is a variant of faster_rcnn_convnext_tiny_FPN_1x.yaml with
# layer-wise learning rate decay (LLRD) enabled. Intended for
# distilled / foundation-pretrained backbones (DINOv3 LVD-1689M and
# similar) where uniform-LR whole-backbone fine-tune degrades
# pretrained features.
#
# Scheme: MMDet's get_layer_id_for_convnext with stage-2 block_id//3
# bucketing. ConvNeXt-Tiny → num_layers=6 (derived, not configured).
#
# llrd_decay PROVENANCE — sweep mandatory before publication.
# This value (0.7) is borrowed from MMDet's
# configs/convnext/cascade-mask-rcnn_convnext-t-p4-w7_fpn_4conv1fc-giou_amp-ms-crop-3x_coco.py
# which trains ConvNeXt-Tiny with a *Cascade Mask R-CNN* head, NOT a
# Faster R-CNN head. The same backbone with a vanilla Mask R-CNN head
# uses 0.95 in MMDet's mask-rcnn_convnext-t-...py — a ~9x stem-LR
# swing on ImageNet-trained ConvNeXt-T driven purely by the head.
# Treat 0.7 as a sweep starting point, not a validated default.
# Suggested sweep grid: {0.6, 0.7, 0.8, 0.9, 0.95}.
model:
  meta_architecture: faster_rcnn
  backbone:
    name: convnext_tiny
    freeze_at: 0
    weights_path: convnext_tiny.pth
  roi_heads:
    num_classes: 80
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  pixel_std: [58.395, 57.120, 57.375]

input:
  min_size_test: 800
  max_size_test: 1333
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5

solver:
  optimizer_name: AdamW
  base_lr: 1.0e-4
  weight_decay: 0.05
  weight_decay_norm: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

  llrd_enabled: true
  llrd_decay: 0.7

  ims_per_batch: 8
  grad_accum_steps: 2
  max_iter: 90_000
  steps: [60_000, 80_000]
  warmup_iters: 1_500
  warmup_factor: 0.001
  warmup_method: linear
  lr_scheduler_name: WarmupCosineLR

  clip_gradients_enabled: true
  clip_gradients_value: 0.1
  clip_gradients_type: norm

  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
