# R-50-FPN Faster R-CNN — 1x schedule (90k iters).
# Use this to validate the recipe quickly; 1x is 3× cheaper than 3x and a
# recipe that beats the D2 baseline at 1x will beat it at 3x.
#
# Recipe: cosine LR, EMA weight averaging, color jitter, Mosaic + MixUp.
# Backbone trained as BN+freeze_at=0 (tools/train_mayaku.py injects this);
# config ships as FrozenBN+freeze_at=2 for fine-tuning compatibility.
# CopyPaste excluded — detection images carry no bitmask annotations.
#
# D2 1x baseline (no EMA, no augmentation): d2_baseline/detection/faster_rcnn_R_50_FPN_1x.yaml
# D2 published 1x: 37.9 box AP. Target with this recipe: ≥ 39 AP.
model:
  meta_architecture: faster_rcnn
  backbone:
    name: resnet50
    norm: FrozenBN
    freeze_at: 2
    # Torchvision IMAGENET1K_V2 weights (loaded by `pretrained_backbone=True`)
    # put stride-2 in the 3x3 conv of res3/res4/res5; D2's MSRA pretraining
    # puts it in the 1x1. The two layouts are not weight-compatible — using
    # `stride_in_1x1=true` here with torchvision weights miscalibrates every
    # downstream activation by ~58×, training collapses to "predict
    # background" and box AP stays at 0. This config is for from-scratch
    # training, so we match torchvision.
    stride_in_1x1: false
  roi_heads:
    num_classes: 80
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  # Torchvision IMAGENET1K_V2 expects std-normalized inputs. The values
  # below are 0.229*255 / 0.224*255 / 0.225*255 — the standard ImageNet
  # std in 0..255 pixel units. D2's [1, 1, 1] is for caffe2-style weights
  # only; pairing it with torchvision weights inflates input magnitudes by
  # the same factor and triggers the same divergence as `stride_in_1x1`.
  pixel_std: [58.395, 57.120, 57.375]

input:
  min_size_test: 800
  max_size_test: 1333
  # Modernization: colour jitter applied after the
  # geometric augs. Doesn't touch bboxes / masks / keypoints — pure pixel-
  # value modification, no annotation update needed.
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5
  # Multi-sample augmentation: one Bernoulli per sample picks Mosaic
  # (4-image stitch) or MixUp (2-image alpha blend). Independent — both
  # could fire on the same step but only the first to fire wins. Mosaic
  # is the heavier regulariser; MixUp adds a small additional kick.

solver:
  # Effective batch size = ims_per_batch * grad_accum_steps. For a 24 GB
  # GPU keep ims_per_batch=16, grad_accum_steps=1 (the D2 1x baseline).
  # For a 12 GB GPU drop ims_per_batch to 8 and set grad_accum_steps=2 —
  # gradients are mathematically identical, AP target unchanged.
  ims_per_batch: 8
  grad_accum_steps: 2
  base_lr: 0.02
  # 1x schedule: 90k iters with LR decay milestones kept for schema
  # validation, but they're inert under WarmupCosineLR (which uses a
  # smooth half-cosine decay over [warmup_iters, max_iter) instead).
  max_iter: 90_000
  steps: [60_000, 80_000]
  warmup_iters: 1_000
  warmup_factor: 0.001
  warmup_method: linear
  lr_scheduler_name: WarmupCosineLR
  # Modernization: EMA shadow tracks live weights with warmup ramp.
  # Final-checkpoint EMA weights typically score 0.3-0.5 AP higher than
  # the live weights. Saved separately under output_dir/ema/.
  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
