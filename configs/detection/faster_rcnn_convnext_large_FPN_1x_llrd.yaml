# Faster R-CNN — ConvNeXt-Large + FPN + LLRD, 1x schedule (90k iters).
#
# Variant of faster_rcnn_convnext_large_FPN_1x.yaml with layer-wise
# learning rate decay (LLRD) enabled. Intended for distilled /
# foundation-pretrained backbones.
#
# Scheme: MMDet's get_layer_id_for_convnext with stage-2 block_id//3
# bucketing. ConvNeXt-Large → num_layers=12 (derived, not configured).
#
# llrd_decay PROVENANCE — sweep mandatory before publication.
# 0.8 is chosen by analogy to ConvNeXt-Base + RTMDet (MMDet's
# rtmdet_l_convnext_b_4xb32-100e_coco.py). No MMDet config trains
# ConvNeXt-Large with any detector head, so this value has NO direct
# upstream reference. Treat as a sweep starting point with lower
# confidence than even the other _llrd variants. Suggested grid:
# {0.6, 0.7, 0.8, 0.9, 0.95}.
model:
  meta_architecture: faster_rcnn
  backbone:
    name: convnext_large
    freeze_at: 0
    weights_path: models/dinov3/dinov3_convnext_large_pretrain_lvd1689m-61fa432d.pth
  roi_heads:
    num_classes: 80
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  pixel_std: [58.395, 57.120, 57.375]

input:
  min_size_test: 800
  max_size_test: 1333
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5

solver:
  llrd_enabled: true
  llrd_decay: 0.8

  ims_per_batch: 2
  grad_accum_steps: 8
  base_lr: 0.02
  max_iter: 90_000
  steps: [60_000, 80_000]
  warmup_iters: 1_000
  warmup_factor: 0.001
  warmup_method: linear
  lr_scheduler_name: WarmupCosineLR
  amp_enabled: false
  amp_dtype: fp16
  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
