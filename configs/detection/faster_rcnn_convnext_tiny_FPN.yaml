# Faster R-CNN — ConvNeXt-Tiny + FPN, 1x schedule (90k iters).
# Backbone: ConvNeXt-Tiny (29M params, depths [3,3,9,3], dims [96,192,384,768]).
#
# Optimizer: AdamW. ConvNeXt is an AdamW architecture — the original
# Liu et al. 2022 paper, the official `facebookresearch/ConvNeXt`
# object-detection repo, MMDet's ConvNeXt configs, and Detectron2's
# ConvNeXt baselines all use AdamW. SGD at the R-50 LR (0.02) destroys
# the pretrained features in the first thousand iterations on
# LayerNorm/GELU-based architectures.
#
# Ships with `weights_path` pre-filled for the DINOv3 LVD-1689M
# checkpoint (distillation from a frozen ViT-7B teacher). Swap it for
# any compatible ConvNeXt .pth or .safetensors (the original Liu et al.
# release, other distillations, your own fine-tunes), or drop the
# field and pair with `--pretrained-backbone` for torchvision
# ImageNet-1k init instead.
#
# Recipe: AdamW + cosine LR + EMA weight averaging + photometric jitter.
# Whole-backbone fine-tune (freeze_at=0) — strong pretrained features
# (e.g., DINOv3) make whole-backbone fine-tune the typical recipe;
# freezing early stages tends to leave AP on the table.
#
# DINOv3 weights are license-gated; Mayaku ships no URLs. Download from
# https://huggingface.co/facebook/dinov3-convnext-tiny-pretrain-lvd1689m
# after accepting the upstream license.
#
# VRAM rough guide (1x schedule, 800-pixel short side, fp32):
#   12 GB GPU: ims_per_batch=8, grad_accum_steps=2 (effective batch 16) — this file
#   24 GB GPU: ims_per_batch=16, grad_accum_steps=1
model:
  meta_architecture: faster_rcnn
  backbone:
    name: convnext_tiny
    # Strong pretrained features (e.g., DINOv3) cover low-level texture
    # as well as semantics — whole-backbone fine-tune is the typical
    # recipe and gives best AP on standard detection benchmarks. Bump
    # to 1 (freeze stem) to recover ~10% backbone compute if VRAM-bound;
    # freeze_at >= 2 is rarely worth it.
    freeze_at: 0
    weights_path: /home/dataserver/Downloads/convnext_tiny_22k_224.pth
  roi_heads:
    num_classes: 80
  roi_box_head:
    num_conv: 0
    num_fc: 2
    fc_dim: 1024
  # Pretrained ConvNeXt checkpoints use standard ImageNet RGB
  # normalisation, same convention as torchvision's pretrained ResNet —
  # std-normalised inputs in 0..255.
  pixel_std: [58.395, 57.120, 57.375]

input:
  min_size_test: 800
  max_size_test: 1333
  color_jitter_enabled: true
  color_jitter_brightness: 0.4
  color_jitter_contrast: 0.4
  color_jitter_saturation: 0.7
  color_jitter_hue: 0.015
  color_jitter_prob: 0.5

solver:
  # AdamW recipe calibrated for effective batch 16 from the official
  # ConvNeXt object-detection repo (and matched by MMDet's ConvNeXt-Tiny
  # COCO configs).
  optimizer_name: AdamW
  base_lr: 1.0e-4
  weight_decay: 0.05
  weight_decay_norm: 0.0
  betas: [0.9, 0.999]
  eps: 1.0e-8

  ims_per_batch: 8
  grad_accum_steps: 2          # effective batch = 16
  num_epochs: 12

  # AdamW typically clips with max_norm ~ 0.1 — much tighter than SGD's
  # 5.0 because Adam-style updates are already moment-normalised.
  clip_gradients_enabled: true
  clip_gradients_value: 0.1
  clip_gradients_type: norm

  ema_enabled: true
  ema_decay: 0.9999
  ema_tau: 2_000.0
